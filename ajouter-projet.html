<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajouter un projet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Gestion de Portfolio</h1>
      <p>Ajout d'un nouveau projet.</p>
    </header>

    <nav class="site-nav" aria-label="Navigation principale">
      <a href="index.html">Accueil</a>
      <a href="lister-projets.html">Lister les projets</a>
      <a href="detailler-projet.html">Détailler un projet</a>
      <a href="ajouter-projet.html">Ajouter un projet</a>
    </nav>

    <main>
      <section class="panel">
        <h2>Ajouter un projet</h2>
        <p>Renseignez toutes les caractéristiques demandées pour enregistrer un projet.</p>

        <form class="project-form" action="lister-projets.html" method="get">
          <label for="libelle">Libellé du projet</label>
          <input id="libelle" name="libelle" type="text" required />

          <label for="description">Description</label>
          <textarea id="description" name="description" rows="6" required></textarea>

          <label for="image">URL de l'image</label>
          <input id="image" name="image" type="url" placeholder="https://..." required />

          <label for="technologies">Technologies utilisées (séparées par des virgules)</label>
          <input id="technologies" name="technologies" type="text" placeholder="HTML, CSS, Flexbox" required />

          <label for="date-realisation">Date de réalisation</label>
          <input id="date-realisation" name="date-realisation" type="month" required />

          <button type="submit">Enregistrer le projet</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>FULLSTACK_PORTFOLIO - Demo HTML/CSS - 2026</p>
    </footer>
  </body>
</html>
